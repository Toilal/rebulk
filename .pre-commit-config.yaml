# Run locally with:  uvx pre-commit run --all-files
# Install the git hook with:  uvx pre-commit install
#
# All hooks are `local` + `language: system` and invoke the tools through `uvx`,
# so pre-commit never manages its own hook environments and tool versions stay
# under uv's control.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uvx mypy
        language: system
        types: [python]
        pass_filenames: false
