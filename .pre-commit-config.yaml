# Install the git hooks with:  uvx pre-commit install
# Run the file hooks manually with:  uvx pre-commit run --all-files
#
# All hooks are `local` + `language: system` so pre-commit never manages its own
# hook environments; every tool runs through `uvx`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uvx mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: commitizen
        name: commitizen check
        entry: uvx --from commitizen cz check --commit-msg-file
        language: system
        stages: [commit-msg]
